<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>F.R.I.D.A.Y</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   THEMES
══════════════════════════════════════ */
:root {
  --font-fa: 'Vazirmatn', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --nav-h: 64px;
  --r: 16px;
  --r-sm: 10px;
  --transition: 0.2s ease;
}

/* ── Dark (default) ── */
[data-theme="dark"] {
  --bg0: #0d0d12;
  --bg1: #13131a;
  --bg2: #1a1a24;
  --bg3: #22222e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text1: #e8e8f0;
  --text2: #9090a8;
  --text3: #5a5a72;
  --accent: #7c6dfa;
  --accent2: #00d4aa;
  --accent3: #f472b6;
  --accent4: #fb923c;
  --accent-glow: rgba(124,109,250,0.2);
  --nav-bg: rgba(13,13,18,0.92);
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --input-bg: rgba(255,255,255,0.05);
  --orb1: rgba(124,109,250,0.15);
  --orb2: rgba(0,212,170,0.1);
}

/* ── AMOLED ── */
[data-theme="amoled"] {
  --bg0: #000000;
  --bg1: #050505;
  --bg2: #0a0a0a;
  --bg3: #111111;
  --border: rgba(255,255,255,0.05);
  --border2: rgba(255,255,255,0.1);
  --text1: #ffffff;
  --text2: #888888;
  --text3: #444444;
  --accent: #00ffcc;
  --accent2: #ff3366;
  --accent3: #ffcc00;
  --accent4: #00aaff;
  --accent-glow: rgba(0,255,204,0.15);
  --nav-bg: rgba(0,0,0,0.96);
  --card-bg: rgba(255,255,255,0.02);
  --card-border: rgba(255,255,255,0.04);
  --input-bg: rgba(255,255,255,0.04);
  --orb1: rgba(0,255,204,0.08);
  --orb2: rgba(255,51,102,0.06);
}

/* ── Midnight Blue ── */
[data-theme="midnight"] {
  --bg0: #040814;
  --bg1: #080f20;
  --bg2: #0d1630;
  --bg3: #131e3e;
  --border: rgba(100,140,255,0.1);
  --border2: rgba(100,140,255,0.18);
  --text1: #dde8ff;
  --text2: #7a90c0;
  --text3: #3a4f80;
  --accent: #4d9fff;
  --accent2: #00e5ff;
  --accent3: #a78bfa;
  --accent4: #34d399;
  --accent-glow: rgba(77,159,255,0.2);
  --nav-bg: rgba(4,8,20,0.94);
  --card-bg: rgba(100,140,255,0.04);
  --card-border: rgba(100,140,255,0.08);
  --input-bg: rgba(100,140,255,0.06);
  --orb1: rgba(77,159,255,0.12);
  --orb2: rgba(0,229,255,0.08);
}

/* ── Royal ── */
[data-theme="royal"] {
  --bg0: #0a0502;
  --bg1: #110800;
  --bg2: #180c00;
  --bg3: #201200;
  --border: rgba(200,150,50,0.12);
  --border2: rgba(200,150,50,0.22);
  --text1: #f5e6c8;
  --text2: #a08060;
  --text3: #5a4030;
  --accent: #d4a017;
  --accent2: #e83030;
  --accent3: #ff6b35;
  --accent4: #c0392b;
  --accent-glow: rgba(212,160,23,0.2);
  --nav-bg: rgba(10,5,2,0.94);
  --card-bg: rgba(200,150,50,0.04);
  --card-border: rgba(200,150,50,0.08);
  --input-bg: rgba(200,150,50,0.06);
  --orb1: rgba(212,160,23,0.12);
  --orb2: rgba(232,48,48,0.08);
}

/* ── Light ── */
[data-theme="light"] {
  --bg0: #f0f2f8;
  --bg1: #ffffff;
  --bg2: #f5f6fc;
  --bg3: #eaedf8;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.13);
  --text1: #111128;
  --text2: #5a5a7a;
  --text3: #a0a0b8;
  --accent: #5b4de0;
  --accent2: #00a882;
  --accent3: #d43f8a;
  --accent4: #e06020;
  --accent-glow: rgba(91,77,224,0.12);
  --nav-bg: rgba(240,242,248,0.94);
  --card-bg: rgba(0,0,0,0.02);
  --card-border: rgba(0,0,0,0.06);
  --input-bg: rgba(0,0,0,0.04);
  --orb1: rgba(91,77,224,0.08);
  --orb2: rgba(0,168,130,0.06);
}

/* ── 🌸 Sakura (NEW) ── */
[data-theme="sakura"] {
  --bg0: #0f080d;
  --bg1: #160d12;
  --bg2: #1e1018;
  --bg3: #28141f;
  --border: rgba(255,150,180,0.1);
  --border2: rgba(255,150,180,0.2);
  --text1: #ffe8f0;
  --text2: #c8909a;
  --text3: #7a4a55;
  --accent: #ff6b9d;
  --accent2: #ff9ec4;
  --accent3: #ffd6e7;
  --accent4: #c44d7b;
  --accent-glow: rgba(255,107,157,0.25);
  --nav-bg: rgba(15,8,13,0.94);
  --card-bg: rgba(255,107,157,0.04);
  --card-border: rgba(255,107,157,0.08);
  --input-bg: rgba(255,107,157,0.06);
  --orb1: rgba(255,107,157,0.15);
  --orb2: rgba(255,158,196,0.1);
}

/* ── 🌿 Forest (NEW) ── */
[data-theme="forest"] {
  --bg0: #050e08;
  --bg1: #0a1510;
  --bg2: #0f1e16;
  --bg3: #14271c;
  --border: rgba(80,200,120,0.1);
  --border2: rgba(80,200,120,0.18);
  --text1: #d8f5e0;
  --text2: #80b890;
  --text3: #3a6a48;
  --accent: #4ade80;
  --accent2: #22d3ee;
  --accent3: #a3e635;
  --accent4: #f59e0b;
  --accent-glow: rgba(74,222,128,0.2);
  --nav-bg: rgba(5,14,8,0.94);
  --card-bg: rgba(74,222,128,0.04);
  --card-border: rgba(74,222,128,0.07);
  --input-bg: rgba(74,222,128,0.05);
  --orb1: rgba(74,222,128,0.12);
  --orb2: rgba(34,211,238,0.08);
}

/* ── 🔥 Lava (NEW) ── */
[data-theme="lava"] {
  --bg0: #0e0500;
  --bg1: #160800;
  --bg2: #200c00;
  --bg3: #2c1000;
  --border: rgba(255,100,20,0.1);
  --border2: rgba(255,100,20,0.2);
  --text1: #fff0e0;
  --text2: #c08060;
  --text3: #6a3a1a;
  --accent: #ff6020;
  --accent2: #ffb020;
  --accent3: #ff3060;
  --accent4: #ff8040;
  --accent-glow: rgba(255,96,32,0.25);
  --nav-bg: rgba(14,5,0,0.95);
  --card-bg: rgba(255,96,32,0.04);
  --card-border: rgba(255,96,32,0.08);
  --input-bg: rgba(255,96,32,0.06);
  --orb1: rgba(255,96,32,0.15);
  --orb2: rgba(255,176,32,0.1);
}

/* ── 🪐 Nebula (NEW) ── */
[data-theme="nebula"] {
  --bg0: #06030f;
  --bg1: #0a0518;
  --bg2: #100820;
  --bg3: #160c2c;
  --border: rgba(180,100,255,0.1);
  --border2: rgba(180,100,255,0.2);
  --text1: #ede0ff;
  --text2: #9070c0;
  --text3: #4a3070;
  --accent: #b460ff;
  --accent2: #60c0ff;
  --accent3: #ff60c0;
  --accent4: #60ffb4;
  --accent-glow: rgba(180,96,255,0.25);
  --nav-bg: rgba(6,3,15,0.95);
  --card-bg: rgba(180,96,255,0.04);
  --card-border: rgba(180,96,255,0.08);
  --input-bg: rgba(180,96,255,0.06);
  --orb1: rgba(180,96,255,0.15);
  --orb2: rgba(96,192,255,0.1);
}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  height: 100%;
  overflow: hidden;
}

body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: var(--bg0);
  color: var(--text1);
  font-family: var(--font-fa);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
}

/* ══════════════════════════════════════
   LOCK SCREEN
══════════════════════════════════════ */
#lockScreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg0);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 28px;
  gap: 0;
}

.lock-logo {
  width: 72px;
  height: 72px;
  border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin-bottom: 20px;
  box-shadow: 0 0 40px var(--accent-glow);
}

.lock-title {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 500;
  color: var(--text1);
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.lock-sub {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--font-mono);
  margin-bottom: 40px;
}

.pin-dots {
  display: flex;
  gap: 14px;
  margin-bottom: 32px;
}

.pin-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border2);
  transition: all 0.15s;
}

.pin-dot.filled {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

.pin-dot.shake { animation: shake 0.3s ease; }

@keyframes shake {
  0%,100%{ transform: translateX(0); }
  25%{ transform: translateX(-6px); }
  75%{ transform: translateX(6px); }
}

.numpad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: 100%;
  max-width: 280px;
}

.num-btn {
  aspect-ratio: 1;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text1);
  font-size: 20px;
  font-weight: 400;
  font-family: var(--font-mono);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.1s;
  user-select: none;
  -webkit-user-select: none;
}

.num-btn:active { transform: scale(0.92); background: var(--bg3); }
.num-btn.del { font-size: 18px; color: var(--text2); }
.num-btn.empty { background: transparent; border: none; pointer-events: none; }

.lock-error {
  font-size: 12px;
  color: var(--accent2);
  font-family: var(--font-mono);
  margin-top: 16px;
  height: 16px;
  opacity: 0;
  transition: opacity 0.2s;
}
.lock-error.show { opacity: 1; }

/* ══════════════════════════════════════
   BG ORBS
══════════════════════════════════════ */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  animation: orbFloat 14s ease-in-out infinite;
}

.orb1 { width: 300px; height: 300px; background: var(--orb1); top: -80px; right: -60px; animation-delay: 0s; }
.orb2 { width: 250px; height: 250px; background: var(--orb2); bottom: 80px; left: -50px; animation-delay: -5s; }

@keyframes orbFloat {
  0%,100%{ transform: translate(0,0); }
  50%{ transform: translate(20px,-30px); }
}

/* ══════════════════════════════════════
   APP SHELL
══════════════════════════════════════ */
.app {
  position: relative;
  z-index: 1;
  height: 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
.topbar {
  position: relative;
  z-index: 50;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.topbar-logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 1px;
}

.topbar-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
}

.topbar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.icon-btn-top {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 15px;
  transition: all var(--transition);
}

.icon-btn-top:active { background: var(--bg3); }

/* ══════════════════════════════════════
   PAGES — SCROLLABLE AREA
══════════════════════════════════════ */
.pages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  scroll-behavior: smooth;
  padding: 14px 14px calc(var(--nav-h) + 20px);
  position: relative;
}

.pages::-webkit-scrollbar { display: none; }

.page { display: none; }
.page.active { display: block; animation: pageIn 0.25s ease; }

@keyframes pageIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════
   PAGE HEADER
══════════════════════════════════════ */
.page-header { margin-bottom: 18px; }
.page-title { font-size: 20px; font-weight: 700; color: var(--text1); }
.page-sub { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 2px; }

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: var(--r);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* ══════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════ */
.bottom-nav {
  position: relative;
  z-index: 50;
  height: var(--nav-h);
  background: var(--nav-bg);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  flex-shrink: 0;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex: 1;
  padding: 6px 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text3);
  transition: color var(--transition);
  position: relative;
}

.nav-item.active { color: var(--accent); }
.nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: transform var(--transition); }
.nav-item.active .nav-icon { transform: translateY(-2px); }
.nav-label { font-size: 10px; font-family: var(--font-fa); }

.nav-indicator {
  position: absolute;
  top: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  border-radius: 2px;
  background: var(--accent);
  opacity: 0;
  transition: opacity var(--transition);
}
.nav-item.active .nav-indicator { opacity: 1; }

/* ══════════════════════════════════════
   HOME PAGE — SECTIONS
══════════════════════════════════════ */
.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  margin-top: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Stats mini row (3 cards, no "busyDay") ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 4px;
}

.stat-card {
  padding: 12px 10px;
  border-radius: var(--r);
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  position: relative;
  overflow: hidden;
  text-align: center;
}

.stat-card::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 60px; height: 60px;
  border-radius: 50%;
  opacity: 0.2;
  filter: blur(20px);
}

.s1::after { background: var(--accent); }
.s2::after { background: var(--accent2); }
.s3::after { background: var(--accent4); }

.stat-icon { font-size: 16px; margin-bottom: 6px; }

.stat-val {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 500;
  line-height: 1;
  margin-bottom: 2px;
}

.s1 .stat-val { color: var(--accent); }
.s2 .stat-val { color: var(--accent2); }
.s3 .stat-val { color: var(--accent4); }
.stat-lbl { font-size: 10px; color: var(--text3); }

/* ── Horizontal scroll row (movies & links) ── */
.h-scroll-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 6px;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
}

.h-scroll-row::-webkit-scrollbar { display: none; }

/* ── Movie mini card (horizontal) ── */
.movie-mini {
  flex-shrink: 0;
  width: 100px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  background: var(--bg2);
  border: 1px solid var(--border);
  scroll-snap-align: start;
}

.movie-mini-poster {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
}

.movie-mini-fb {
  width: 100%;
  aspect-ratio: 2/3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: var(--bg3);
}

.movie-mini-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px 7px 7px;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
}

.movie-mini-title { font-size: 10px; font-weight: 600; color: #fff; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.movie-mini-year { font-size: 9px; color: rgba(255,255,255,0.5); font-family: var(--font-mono); }
.movie-mini-rating { font-size: 9px; color: #fbbf24; font-family: var(--font-mono); }

/* ── Link mini card (YouTube style horizontal) ── */
.link-mini {
  flex-shrink: 0;
  width: 200px;
  border-radius: 12px;
  overflow: hidden;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  scroll-snap-align: start;
  text-decoration: none;
  display: flex;
  flex-direction: column;
}

.link-mini-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  background: var(--bg3);
}

.link-mini-thumb-fb {
  width: 100%;
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  background: var(--bg3);
}

.link-mini-info { padding: 8px 10px; }
.link-mini-name { font-size: 11px; font-weight: 600; color: var(--text1); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }

        <div class="theme-preview" style="background:linear-gradient(135deg,#0a0502,#201200);border-color:rgba(212,160,23,0.4)"></div>
        <span class="theme-name">Royal</span>
      </button>
      <button class="theme-btn" data-theme="light" onclick="setTheme('light',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#f0f2f8,#fff);border-color:rgba(91,77,224,0.2)"></div>
        <span class="theme-name">Light</span>
      </button>
      <button class="theme-btn" data-theme="sakura" onclick="setTheme('sakura',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#0f080d,#28141f);border-color:rgba(255,107,157,0.4)"></div>
        <span class="theme-name">🌸 Sakura</span>
      </button>
      <button class="theme-btn" data-theme="forest" onclick="setTheme('forest',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#050e08,#14271c);border-color:rgba(74,222,128,0.3)"></div>
        <span class="theme-name">🌿 Forest</span>
      </button>
      <button class="theme-btn" data-theme="lava" onclick="setTheme('lava',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#0e0500,#2c1000);border-color:rgba(255,96,32,0.4)"></div>
        <span class="theme-name">🔥 Lava</span>
      </button>
      <button class="theme-btn" data-theme="nebula" onclick="setTheme('nebula',this)">
        <div class="theme-preview" style="background:linear-gradient(135deg,#06030f,#160c2c);border-color:rgba(180,96,255,0.4)"></div>
        <span class="theme-name">🪐 Nebula</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════
   CONFIG
════════════════════════════════════ */
const API = "https://script.google.com/macros/s/AKfycbzxljrF2WvzSJ0xFtxEoFh8Y5QSwg-Kp2LxO-nSJzzoZ10JzYdqcWk3g0vwrHg4Dru0AA/exec";
const CORRECT_PIN = "5941";
const OMDB_KEY = "7470d23b"; // اگه کلید OMDB داری اینجا بذار مثل: "abc12345"

/* ════════════════════════════════════
   LOCK
════════════════════════════════════ */
let pinInput = "";

function pinPress(n) {
  if (pinInput.length >= 4) return;
  pinInput += n;
  updateDots();
  if (pinInput.length === 4) setTimeout(checkPin, 80);
}

function pinDel() {
  pinInput = pinInput.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinInput.length);
  }
}

function checkPin() {
  if (pinInput === CORRECT_PIN) {
    const lock = document.getElementById('lockScreen');
    lock.style.transition = 'opacity 0.4s';
    lock.style.opacity = '0';
    setTimeout(() => {
      lock.style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initApp();
    }, 400);
  } else {
    document.getElementById('lockError').classList.add('show');
    document.querySelectorAll('.pin-dot').forEach(d => {
      d.classList.add('shake');
      setTimeout(() => d.classList.remove('shake'), 400);
    });
    setTimeout(() => {
      pinInput = "";
      updateDots();
      document.getElementById('lockError').classList.remove('show');
    }, 800);
  }
}

/* ════════════════════════════════════
   THEME
════════════════════════════════════ */
function setTheme(t, btn) {
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('friday_theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  closeTheme();
}

function openTheme() { document.getElementById('themeModal').classList.add('open'); }
function closeTheme(e) {
  if (!e || e.target === document.getElementById('themeModal')) {
    document.getElementById('themeModal').classList.remove('open');
  }
}

function loadTheme() {
  const saved = localStorage.getItem('friday_theme') || 'dark';
  document.body.setAttribute('data-theme', saved);
  const btn = document.querySelector(`.theme-btn[data-theme="${saved}"]`);
  if (btn) btn.classList.add('active');
}

loadTheme();

/* ════════════════════════════════════
   NAVIGATION
════════════════════════════════════ */
let currentPage = 'home';
const loadedPages = {};

function navTo(btn) {
  const p = btn.dataset.page;
  if (p === currentPage) return;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  document.getElementById('pages').scrollTop = 0;
  currentPage = p;
  if (!loadedPages[p]) { loadPage(p); loadedPages[p] = true; }
}

function loadPage(p) {
  if (p === 'home') loadHome();
  else if (p === 'links') loadLinks();
  else if (p === 'movies') loadMovies();
  else if (p === 'archive') loadArchive();
  else if (p === 'pass') loadPasswords();
}

function refreshPage() {
  loadedPages[currentPage] = false;
  loadPage(currentPage);
  showToast('↺ در حال بروزرسانی...');
}

/* ════════════════════════════════════
   CLOCK
════════════════════════════════════ */
function updateClock() {
  const t = new Date().toLocaleTimeString('fa-IR', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Tehran' });
  document.getElementById('topTime').textContent = t;
}

/* ════════════════════════════════════
   API FETCH
════════════════════════════════════ */
async function apiFetch(page) {
  try {
    const r = await fetch(API + '?page=' + page + '_data');
    const json = await r.json();
    if (json.ok) return json.data;
    return null;
  } catch (e) {
    console.error('API Error:', e);
    return null;
  }
}

/* ════════════════════════════════════
   HELPERS
════════════════════════════════════ */
function getDomain(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return url; }
}

function getYtThumb(url) {
  const m = url.match(/[?&]v=([^&]+)/);
  if (m) return `https://img.youtube.com/vi/${m[1]}/mqdefault.jpg`;
  const s = url.match(/youtu\.be\/([^?]+)/);
  if (s) return `https://img.youtube.com/vi/${s[1]}/mqdefault.jpg`;
  return null;
}

function catKey(cat) {
  if (!cat) return 'other';
  const c = cat.toLowerCase();
  if (c.includes('instagram')) return 'ig';
  if (c.includes('youtube')) return 'yt';
  if (c.includes('twitter') || c.includes('x.com')) return 'tw';
  if (c.includes('telegram')) return 'tg';
  if (c.includes('github')) return 'gh';
  if (c.includes('web') || c.includes('article')) return 'web';
  return 'other';
}

function catEmoji(cat) {
  return { ig:'📸', yt:'▶️', tw:'✦', web:'🌐', tg:'✈️', gh:'🐙', other:'📁' }[catKey(cat)] || '📁';
}

/* ════════════════════════════════════
   HOME PAGE
════════════════════════════════════ */
async function loadHome() {
  // Run all in parallel
  const [statsData, moviesData, linksData, archiveData] = await Promise.all([
    apiFetch('stats'),
    apiFetch('watchlist'),
    apiFetch('vault'),
    apiFetch('archive')
  ]);

  // Stats (3 cards)
  if (statsData) {
    document.getElementById('hv-total').textContent = statsData.total;
    document.getElementById('hv-week').textContent = statsData.week;
    document.getElementById('hv-today').textContent = statsData.today;
  }

  // Movies horizontal scroll (latest 10)
  const moviesEl = document.getElementById('homeMovies');
  if (moviesData && moviesData.length) {
    const latest = moviesData.slice(0, 10);
    moviesEl.innerHTML = latest.map(m => {
      const poster = m.poster
        ? `<img class="movie-mini-poster" src="${m.poster}" alt="" loading="lazy" onerror="this.outerHTML='<div class=movie-mini-fb>🎬</div>'">`
        : `<div class="movie-mini-fb">🎬</div>`;
      return `<div class="movie-mini">
        ${poster}
        <div class="movie-mini-overlay">
          <div class="movie-mini-title">${m.title}</div>
          ${m.year ? `<div class="movie-mini-year">${m.year}</div>` : ''}
          ${m.rating ? `<div class="movie-mini-rating">★ ${m.rating}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    moviesEl.innerHTML = '<div class="empty-state">// فیلمی ثبت نشده</div>';
  }

  // Links horizontal scroll (latest 10, YouTube style)
  const linksEl = document.getElementById('homeLinks');
  if (linksData && linksData.length) {
    const latest = linksData.slice(0, 10);
    linksEl.innerHTML = latest.map(l => {
      const ck = catKey(l.category);
      const ytThumb = ck === 'yt' ? getYtThumb(l.url) : null;

      let thumbHtml;
      if (ytThumb) {
        thumbHtml = `<img class="link-mini-thumb" src="${ytThumb}" alt="" loading="lazy"
          onerror="this.outerHTML='<div class=link-mini-thumb-fb>${catEmoji(l.category)}</div>'">`;
      } else {
        thumbHtml = `<div class="link-mini-thumb-fb">${catEmoji(l.category)}</div>`;
      }

      return `<a class="link-mini" href="${l.url}" target="_blank" rel="noopener">
        ${thumbHtml}
        <div class="link-mini-info">
          <div class="link-mini-name">${l.name}</div>
          <div class="link-mini-domain">${getDomain(l.url)}</div>
        </div>
      </a>`;
    }).join('');
  } else {
    linksEl.innerHTML = '<div class="empty-state">// لینکی ثبت نشده</div>';
  }

  // Archive (latest 3)
  const archEl = document.getElementById('homeArchive');
  if (archiveData && archiveData.length) {
    const latest = archiveData.slice(0, 3);
    archEl.innerHTML = latest.map((a, i) => `
      <div class="arch-mini" onclick="openArchModalDirect('${escSafe(a.title)}','${escSafe(a.content)}')">
        <div class="arch-mini-title">${a.title}</div>
        <div class="arch-mini-preview">${a.content}</div>
        <div class="arch-mini-date">${a.date || ''}</div>
      </div>
    `).join('');
  } else {
    archEl.innerHTML = '<div class="empty-state">// آرشیوی وجود ندارد</div>';
  }

  // Recent submissions with answers
  const recentEl = document.getElementById('homeRecent');
  if (statsData && statsData.recent && statsData.recent.length) {
    recentEl.innerHTML = statsData.recent.map(r => {
      // Build answer pills if answers exist
      let pillsHtml = '';
      if (r.answers && Array.isArray(r.answers) && r.answers.length) {
        pillsHtml = `<div class="answer-pills">` +
          r.answers.map(a => {
            const timePart = a.time ? `<span class="pill-t">[${a.time}s]</span>` : '';
            const qNum = a.qId ? `<span class="pill-q">Q${a.qId}:</span>` : '';
            return `<div class="answer-pill">${qNum}${a.answer}${timePart}</div>`;
          }).join('') +
        `</div>`;
      }

      return `<div class="recent-item">
        <div class="recent-avatar">${(r.name||'?').charAt(0)}</div>
        <div class="recent-info">
          <div class="recent-name">${r.name} <span style="font-size:11px;color:var(--text3)">(${r.age} ساله)</span></div>
          <div class="recent-meta">${r.source} — ${r.date}</div>
          ${pillsHtml}
        </div>
      </div>`;
    }).join('');
  } else {
    recentEl.innerHTML = '<div class="empty-state">// ثبتی وجود ندارد</div>';
  }
}

/* ════════════════════════════════════
   LINKS PAGE (full)
════════════════════════════════════ */
let allLinks = [], linkCat = 'all', linkQ = '';

async function loadLinks() {
  const data = await apiFetch('vault');
  if (!data) {
    document.getElementById('linkList').innerHTML = '<div class="empty-state">// خطا در دریافت لینک‌ها</div>';
    return;
  }
  allLinks = data;
  renderLinks();

  document.getElementById('linkSearch').oninput = e => {
    linkQ = e.target.value.trim();
    renderLinks();
  };
}

function renderLinks() {
  const cats = { all: allLinks.length };
  allLinks.forEach(l => { const k = catKey(l.category); cats[k] = (cats[k] || 0) + 1; });
  const catNames = { all:'همه', ig:'Instagram', yt:'YouTube', tw:'Twitter', web:'Web', tg:'Telegram', gh:'GitHub', other:'سایر' };

  document.getElementById('linkCats').innerHTML = Object.entries(cats).map(([k, v]) =>
    `<div class="cat-pill ${k === linkCat ? 'active' : ''}" onclick="setLinkCat('${k}')">${catNames[k]||k} (${v})</div>`
  ).join('');

  let filtered = allLinks;
  if (linkCat !== 'all') filtered = filtered.filter(l => catKey(l.category) === linkCat);
  if (linkQ) {
    const q = linkQ.toLowerCase();
    filtered = filtered.filter(l => l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q));
  }

  if (!filtered.length) {
    document.getElementById('linkList').innerHTML = '<div class="empty-state">// لینکی یافت نشد</div>';
    return;
  }

  document.getElementById('linkList').innerHTML = filtered.map(l => {
    const ck = catKey(l.category);
    const ytThumb = ck === 'yt' ? getYtThumb(l.url) : null;

    let thumbHtml;
    if (ytThumb) {
      thumbHtml = `<img class="link-card-thumb" src="${ytThumb}" alt="" loading="lazy"
        onerror="this.outerHTML='<div class=link-card-thumb-fb>${catEmoji(l.category)}</div>'">`;
    } else {
      thumbHtml = `<div class="link-card-thumb-fb">${catEmoji(l.category)}</div>`;
    }

    return `<a class="link-card cat-${ck}" href="${l.url}" target="_blank" rel="noopener">
      <div class="link-side-bar"></div>
      ${thumbHtml}
      <div class="link-card-info">
        <div class="link-card-name">${l.name}</div>
        <div class="link-card-domain">${getDomain(l.url)}</div>
        <div class="link-card-date">${l.date || ''}</div>
      </div>
    </a>`;
  }).join('');
}

function setLinkCat(cat) {
  linkCat = cat;
  renderLinks();
}

/* ════════════════════════════════════
   MOVIES PAGE
════════════════════════════════════ */
async function loadMovies() {
  const data = await apiFetch('watchlist');
  if (!data || !data.length) {
    document.getElementById('movieGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">// لیست خالیه</div>';
    return;
  }

  // Try OMDB for posters if key is set
  const moviesWithPosters = OMDB_KEY
    ? await fetchOMDBPosters(data)
    : data;

  document.getElementById('movieGrid').innerHTML = moviesWithPosters.map(m => {
    const poster = m.poster
      ? `<img class="movie-poster" src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.outerHTML='<div class=movie-poster-fb>🎬</div>'">`
      : `<div class="movie-poster-fb">🎬</div>`;
    return `<div class="movie-card">
      ${poster}
      <div class="movie-overlay">
        <div class="movie-title">${m.title}</div>
        <div class="movie-year">${m.year || ''}</div>
        ${m.rating ? `<div class="movie-rating">★ ${m.rating}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function fetchOMDBPosters(movies) {
  const results = [];
  for (const m of movies) {
    try {
      if (m.imdbId) {
        const r = await fetch(`https://www.omdbapi.com/?i=${m.imdbId}&apikey=${OMDB_KEY}`);
        const d = await r.json();
        if (d.Poster && d.Poster !== 'N/A') m.poster = d.Poster;
        if (d.imdbRating && d.imdbRating !== 'N/A') m.rating = d.imdbRating;
      }
    } catch(e) {}
    results.push(m);
  }
  return results;
}

/* ════════════════════════════════════
   ARCHIVE PAGE
════════════════════════════════════ */
let allArchive = [], archQ = '';

async function loadArchive() {
  const data = await apiFetch('archive');
  if (!data) {
    document.getElementById('archiveList').innerHTML = '<div class="empty-state">// خطا در دریافت آرشیو</div>';
    return;
  }
  allArchive = data;
  renderArchive();

  document.getElementById('archSearch').oninput = e => {
    archQ = e.target.value.trim();
    renderArchive();
  };
}

function renderArchive() {
  let filtered = allArchive;
  if (archQ) {
    const q = archQ.toLowerCase();
    filtered = filtered.filter(a => a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q));
  }
  if (!filtered.length) {
    document.getElementById('archiveList').innerHTML = '<div class="empty-state">// چیزی یافت نشد</div>';
    return;
  }

  document.getElementById('archiveList').innerHTML = filtered.map((a, i) => `
    <div class="archive-card" onclick="openArchModal(${i})">
      <div class="archive-title">${a.title}</div>
      <div class="archive-preview">${a.content}</div>
      <div class="archive-meta">
        <span class="archive-date">${a.date || ''}</span>
        <span class="archive-badge">مشاهده ↗</span>
      </div>
    </div>
  `).join('');
}

function openArchModal(idx) {
  let filtered = allArchive;
  if (archQ) {
    const q = archQ.toLowerCase();
    filtered = filtered.filter(a => a.title.toLowerCase().includes(q) || a.content.toLowerCase().includes(q));
  }
  const a = filtered[idx];
  if (!a) return;
  document.getElementById('modalTitle').textContent = a.title;
  document.getElementById('modalContent').textContent = a.content;
  document.getElementById('archModal').classList.add('open');
}

function openArchModalDirect(title, content) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalContent').textContent = content;
  document.getElementById('archModal').classList.add('open');
}

function closeArchModal(e) {
  if (!e || e.target === document.getElementById('archModal')) {
    document.getElementById('archModal').classList.remove('open');
  }
}

/* ════════════════════════════════════
   PASSWORDS
════════════════════════════════════ */
function passStrength(pw) {
  let s = 0;
  if (pw.length >= 8) s++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
  if (/[^A-Za-z0-9]/.test(pw)) s++;
  return s;
}

function strDots(pw) {
  const s = passStrength(pw);
  const cls = s === 1 ? 'w' : s === 2 ? 'm' : 's';
  return [1,2,3].map(i => `<div class="str-dot ${i <= s ? cls : ''}"></div>`).join('');
}

const revealed = {};

async function loadPasswords() {
  const data = await apiFetch('pass');
  if (!data || !data.length) {
    document.getElementById('passList').innerHTML = '<div class="empty-state">// پسوردی ثبت نشده</div>';
    return;
  }

  document.getElementById('passList').innerHTML = data.map((p, idx) => `
    <div class="pass-card">
      <div class="pass-header">
        <div class="pass-label-text">🔑 ${p.label}</div>
        <div class="pass-date-text">${p.date || ''}</div>
      </div>
      <div class="pass-row">
        <div class="pass-field" id="pf-${idx}">••••••••••</div>
        <div class="pass-actions">
          <div class="action-btn" onclick="togglePass(${idx},'${escSafe(p.password)}')" id="eye-${idx}">👁</div>
          <div class="action-btn" onclick="copyText('${escSafe(p.password)}')">📋</div>
        </div>
      </div>
      <div class="pass-strength">${strDots(p.password)}</div>
    </div>
  `).join('');
}

function togglePass(idx, pw) {
  const el = document.getElementById('pf-' + idx);
  const btn = document.getElementById('eye-' + idx);
  if (revealed[idx]) {
    el.textContent = '••••••••••';
    el.classList.remove('revealed');
    btn.textContent = '👁';
    revealed[idx] = false;
  } else {
    el.textContent = pw;
    el.classList.add('revealed');
    btn.textContent = '🙈';
    revealed[idx] = true;
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✓ کپی شد'));
}

function escSafe(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, ' ');
}

/* ════════════════════════════════════
   TOAST
════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
function initApp() {
  updateClock();
  setInterval(updateClock, 30000);
  loadHome();
  loadedPages['home'] = true;
}
</script>
